<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" fill="#05050f"/>
  <!-- stars -->
  <circle cx="70" cy="80" r="3" fill="#ffffff"/>
  <circle cx="140" cy="150" r="2" fill="#ffffff" opacity="0.8"/>
  <circle cx="420" cy="90" r="3" fill="#ffffff" opacity="0.9"/>
  <circle cx="360" cy="170" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="90" cy="220" r="2" fill="#ffffff" opacity="0.7"/>
  <circle cx="450" cy="230" r="3" fill="#ffffff"/>
  <!-- moon surface -->
  <path d="M0 430 Q120 400 200 420 T380 415 T512 430 L512 512 L0 512 Z" fill="#c2a06a"/>
  <circle cx="120" cy="470" r="34" fill="#d2691e" stroke="#7a3d10" stroke-width="6"/>
  <!-- lunar module -->
  <g transform="translate(256 250)">
    <!-- flame -->
    <path d="M-26 90 L26 90 L0 180 Z" fill="#ffb030"/>
    <path d="M-13 90 L13 90 L0 145 Z" fill="#fff0b0"/>
    <!-- legs -->
    <g stroke="#9aa0b0" stroke-width="10" stroke-linecap="round">
      <line x1="-44" y1="20" x2="-90" y2="86"/>
      <line x1="44" y1="20" x2="90" y2="86"/>
      <line x1="0" y1="40" x2="0" y2="92"/>
    </g>
    <circle cx="-90" cy="86" r="9" fill="#9aa0b0"/>
    <circle cx="90" cy="86" r="9" fill="#9aa0b0"/>
    <!-- descent stage (octagon) -->
    <polygon points="-40,-34 40,-34 58,-16 58,16 40,34 -40,34 -58,16 -58,-16" fill="#c8c8d0" stroke="#8890a8" stroke-width="4"/>
    <!-- cabin -->
    <rect x="-34" y="-84" width="68" height="48" rx="12" fill="#c8c8d0"/>
    <circle cx="0" cy="-58" r="12" fill="#8890a8"/>
    <!-- engine bell -->
    <polygon points="-14,34 14,34 26,62 -26,62" fill="#5a5a6a"/>
  </g>
</svg>
